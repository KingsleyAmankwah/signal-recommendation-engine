services:
  logger.channel.signal_recommendations:
    parent: logger.channel_base
    arguments:
      - 'signal_recommendations'

  signal_recommendations.view_count_storage:
    class: Drupal\signal_recommendations\ViewCountStorage
    arguments:
      - '@database'
      - '@datetime.time'

  signal_recommendations.scorer:
    class: Drupal\signal_recommendations\Recommendation\RecommendationScorer

  signal_recommendations.provider:
    class: Drupal\signal_recommendations\Recommendation\RecommendationProvider
    arguments:
      - '@entity_type.manager'
      - '@database'
      - '@signal_recommendations.view_count_storage'
      - '@signal_recommendations.scorer'
      - '@config.factory'
      - '@datetime.time'
